<!DOCTYPE html>
<html  lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <meta charset="utf-8"> 
     <title>留言板</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/@waline/client@v2/dist/waline.css"
  />
  <link rel="icon" href="/11.png">
  <style>
      :root {
        --c-bg: #fff;
      }
      html.dark {
        --c-bg: #22272e;
      }
      html, body {
        background-color: var(--c-bg);
      }
      font-family: Georgia , serif ,Microsoft Ya Hei  sans-serif,Hiragino Sans GB,Droid Sans Fallback,Heiti SC;
    </style>
    <script type="javascript">
      const userMode = localStorage.getItem('vuepress-color-scheme');
			const systemDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			if (userMode === 'dark' || (userMode !== 'light' && systemDarkMode)) {
				document.documentElement.classList.toggle('dark', true);
			}
    </script>
</head>
<body>
  <br>
  <div style="text-align: center"><h1 style="color: seagreen;">留言板</h1></div><h5><br></h5>
  <h3>以手写心，畅所欲言。</h3>
  <br>
  <h3><strong>Tips:</strong><br></h3>
  1. <strong style="color: seagreen;">文明</strong>用语，以礼待人。<br><br>
  
  2. 留言时<strong style="color: seagreen;">不用填 邮箱 网址 </strong>这两项，<strong style="color: seagreen;">也不用登录</strong>
  ，写完后点提交就可以了。<br><br>
  
  3. <strong style="color: seagreen;">留言板由 Waline 评论提供技术支持。</strong>加载较慢，请耐心等待。<br><br>
  
  <div id="waline"></div>
  <script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v2/dist/waline.mjs';

    init({
      el: '#waline',
      serverURL: 'https://comments.csy2022.tk',
    });
  </script>
    <waline></waline>
</body>
</html>
